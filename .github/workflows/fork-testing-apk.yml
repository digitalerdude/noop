# Fork-only: build a sideloadable DEBUG testing APK on demand and publish it.
#
# This is NOT for upstream. NoopApp builds and signs RELEASE APKs by hand (see
# android.yml's note). This is ryanbr's convenience build: a debug-signed APK
# (auto debug key, no secrets) with applicationId `com.noop.whoop.debug`, so it
# installs fresh ALONGSIDE any official NOOP build rather than upgrading over it.
# Trigger it from the Actions tab (Run workflow) — output is attached to a
# prerelease and also kept as a run artifact.
name: Testing APK (fork)

on:
  workflow_dispatch:

permissions:
  contents: write   # attach the built APK to a Release on the fork

concurrency:
  group: testing-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleFullDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noop-testing-apk
          path: android/app/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error

      - name: Publish to a prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: testing-${{ github.run_number }}
          name: Testing APK (build ${{ github.run_number }})
          prerelease: true
          files: android/app/build/outputs/apk/full/debug/*.apk
          body: |
            Debug / testing build of NOOP Android (full flavor), debug-signed.

            - applicationId `com.noop.whoop.debug` — installs alongside any official build; it's a fresh install, not an upgrade-over.
            - Built from commit ${{ github.sha }}.
            - Sideload: enable "install unknown apps" for your browser/files app, then open the APK.
